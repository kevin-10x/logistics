version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/afrilogistics
      - SMS_API_KEY=${SMS_API_KEY:-}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - MOMO_API_KEY=${MOMO_API_KEY:-}
      - MOMO_ENVIRONMENT=sandbox
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_DB=afrilogistics
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/api/src/utils/database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  ml:
    build:
      context: ./packages/ml
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
